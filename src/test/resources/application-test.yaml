spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: localhost
    port: 3025
    username: test@example.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            scope: openid, email, profile
            authorization-grant-type: authorization_code

app:
  security:
    jwt:
      secret-key: your-secret-jwt-key-here
      access-token-expiration: 900000
      refresh-token-expiration: 604800000
      registration-token-expiration: 600000
      mfa-token-expiration: 300000

    cors:
      allowed-origins: http://localhost:3000

    oauth2:
      redirect-uri: http://localhost:3000/dashboard

    email:
      reset-password-url: http://localhost:3000/reset-password
      reset-password-expiration: 15

    mfa:
      issuer-name: SpringSecurityAppTest

  seed:
    enabled: false
    admin:
      email: "admin@company.com"
      password: "ChangeMe123!"